    body {
      margin: 0;
      background: #ffffff;
    }
    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes slideInLeft {
      0% { opacity: 0; transform: translate3d(-56px, 0, 0); }
      100% { opacity: 1; transform: translate3d(0, 0, 0); }
    }
    @keyframes slideInRight {
      0% { opacity: 0; transform: translate3d(56px, 0, 0); }
      100% { opacity: 1; transform: translate3d(0, 0, 0); }
    }
    @keyframes imageReveal {
      0% { opacity: 0; transform: scale(1.08); filter: blur(10px); }
      100% { opacity: 1; transform: scale(1); filter: blur(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.5s ease-out;
    }
    .reveal-on-scroll {
      opacity: 0;
      will-change: transform, opacity, filter;
    }
    .reveal-on-scroll.card-enter-left {
      transform: translate3d(-56px, 0, 0);
    }
    .reveal-on-scroll.card-enter-right {
      transform: translate3d(56px, 0, 0);
    }
    .reveal-on-scroll.media-enter {
      transform: scale(1.08);
      filter: blur(10px);
    }
    .reveal-on-scroll.is-visible {
      opacity: 1;
      transform: none;
      filter: none;
    }
    .reveal-on-scroll.is-visible.card-enter-left {
      animation: slideInLeft 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .reveal-on-scroll.is-visible.card-enter-right {
      animation: slideInRight 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .reveal-on-scroll.is-visible.media-enter {
      animation: imageReveal 1s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes headerSlideDown {
      0%   { transform: translateY(-100%); opacity: 0; }
      100% { transform: translateY(0);     opacity: 1; }
    }
    .header-enter {
      animation: headerSlideDown 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    body.acc-text-xl  { font-size: 125% !important; }
    body.acc-contrast { filter: contrast(1.5) saturate(1.1); }
    body.acc-cursor,

      .reveal-on-scroll,
      .reveal-on-scroll.card-enter-left,
      .reveal-on-scroll.card-enter-right,

      .reveal-on-scroll.is-visible.card-enter-right,
      .reveal-on-scroll.is-visible.media-enter {
        opacity: 1 !important;
        transform: none !important;
        filter: none !important;
        animation: none !important;

const setupScrollReveal = () => {
  const nodes = Array.from(document.querySelectorAll('.reveal-on-scroll'));
  if (!nodes.length) {
    return () => {};
  }

  const observer = new IntersectionObserver(
    (entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('is-visible');
          observer.unobserve(entry.target);
        }
      });
    },
    {
      threshold: 0.18,
      rootMargin: '0px 0px -8% 0px'
    }
  );

  nodes.forEach((node) => {
    node.classList.remove('is-visible');
    observer.observe(node);
  });

  return () => observer.disconnect();
};

      return m - 1;
    });

                <button onClick={() => navigate('contact')} className="flex items-center gap-5 p-5 bg-gray-50 hover:bg-gray-100 rounded-2xl transition-colors text-left w-full group">
                   <div className="w-12 h-12 bg-white rounded-xl shadow-sm border border-gray-100 flex items-center justify-center shrink-0 group-hover:scale-105 transition-transform">
                     <Mail size={20} className="text-[#4a5f77]" />
                   </div>
                   <div>
                     <h4 className="font-bold text-[#1c2834] uppercase tracking-wide text-[15px]">CONTACT US</h4>
                     <p className="text-gray-500 text-[13px] mt-0.5">Get in touch</p>
                   </div>
                </button>

                {/* ADMIN LOGIN */}
                <button onClick={() => navigate('admin')} className="flex items-center gap-5 p-5 bg-gray-50 hover:bg-gray-100 rounded-2xl transition-colors text-left w-full group">
                   <div className="w-12 h-12 bg-white rounded-xl shadow-sm border border-gray-100 flex items-center justify-center shrink-0 group-hover:scale-105 transition-transform">
                     <Shield size={20} className="text-[#4a5f77]" />
                   </div>
                   <div>
                     <h4 className="font-bold text-[#1c2834] tracking-wide text-[15px]">Admin Login</h4>
                     <p className="text-gray-500 text-[13px] mt-0.5">Access admin panel</p>
                   </div>
                </button>

              </div>
            </div>

          </div>
        </div>
      )}

      {/* Accessibility Sidebar */}
      <div className={`fixed inset-0 z-[60] flex justify-end transition-opacity duration-300 ${accessOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
          {/* Backdrop */}
          <div className="absolute inset-0 bg-black/30" onClick={() => setAccessOpen(false)}></div>

          {/* Panel */}
          <div className={`relative w-[420px] max-w-full h-full bg-white shadow-2xl flex flex-col transition-transform duration-300 ease-in-out overflow-hidden ${accessOpen ? 'translate-x-0' : 'translate-x-full'}`}>

            {/* Panel Header */}
            <div className="flex justify-between items-start p-8 bg-gradient-to-br from-[#3b4b5e] to-[#4a5f77] text-white shrink-0">
              <div>
                <h2 className="text-2xl font-bold tracking-wide">Accessibility Features</h2>
                <p className="text-[13px] text-gray-200 mt-1.5 font-light tracking-wide">OKU-friendly features</p>
              </div>
              <button onClick={() => setAccessOpen(false)} className="text-white/70 hover:text-white transition-colors mt-1">
                <X size={20} />
              </button>
            </div>

            {/* Options */}
            <div className="flex-grow overflow-y-auto px-8 py-8 bg-white">

              {/* Text Size */}
              <div className="mb-8">
                <div className="flex items-center gap-4 mb-4">
                   <div className="w-12 h-12 rounded-xl bg-[#f0f4f8] flex items-center justify-center text-[#4a7ba7] shrink-0">
                     <TextIcon size={18} />
                   </div>
                   <div>
                     <h4 className="font-bold text-[#1c2834] text-[15px]">Text Size</h4>
                     <p className="text-gray-500 text-[13px] mt-0.5">Adjust font size ({textSize === 0 ? '100%' : textSize === 1 ? '110%' : '125%'})</p>
                   </div>
                </div>
                <div className="flex gap-3">
                   <button onClick={() => setTextSize(Math.max(0, textSize - 1))} className="flex-1 py-3 bg-[#f0f4f8] hover:bg-[#e2e8f0] text-[#1c2834] font-bold text-[13px] rounded-xl flex items-center justify-center gap-2 transition-colors">
                     <ZoomOut size={14} /> Smaller
                   </button>
                   <button onClick={() => setTextSize(Math.min(2, textSize + 1))} className="flex-1 py-3 bg-[#f0f4f8] hover:bg-[#e2e8f0] text-[#1c2834] font-bold text-[13px] rounded-xl flex items-center justify-center gap-2 transition-colors">
                     <ZoomIn size={14} /> Larger
                   </button>
                </div>
              </div>

              {/* High Contrast */}
              <div className="mb-8">
                <div className="flex items-center gap-4 mb-4">
                   <div className="w-12 h-12 rounded-xl bg-[#f0f4f8] flex items-center justify-center text-[#4a7ba7] shrink-0">
                     <ContrastIcon size={20} />
                   </div>
                   <div>
                     <h4 className="font-bold text-[#1c2834] text-[15px]">High Contrast</h4>
                     <p className="text-gray-500 text-[13px] mt-0.5">Enhance visibility</p>
                   </div>
                </div>
                <button onClick={() => setHighContrast(!highContrast)} className={`w-full py-3.5 font-bold text-[13px] rounded-xl transition-colors ${highContrast ? 'bg-[#1c2834] text-white shadow-md' : 'bg-[#f0f4f8] hover:bg-[#e2e8f0] text-[#1c2834]'}`}>
                   {highContrast ? 'Disable High Contrast' : 'Enable High Contrast'}
                </button>
              </div>

              {/* Larger Cursor */}
              <div className="mb-8">
                <div className="flex items-center gap-4 mb-4">
                   <div className="w-12 h-12 rounded-xl bg-[#f0f4f8] flex items-center justify-center text-[#4a7ba7] shrink-0">
                     <CursorIcon size={20} />
                   </div>
                   <div>
                     <h4 className="font-bold text-[#1c2834] text-[15px]">Larger Cursor</h4>
                     <p className="text-gray-500 text-[13px] mt-0.5">Easier to see</p>
                   </div>
                </div>
                <button onClick={() => setLargerCursor(!largerCursor)} className={`w-full py-3.5 font-bold text-[13px] rounded-xl transition-colors ${largerCursor ? 'bg-[#1c2834] text-white shadow-md' : 'bg-[#f0f4f8] hover:bg-[#e2e8f0] text-[#1c2834]'}`}>
                   {largerCursor ? 'Disable Larger Cursor' : 'Enable Larger Cursor'}
                </button>
              </div>

              {/* Keyboard Navigation Info */}
              <div className="mb-6 bg-[#f4f7fb] border-l-[3px] border-[#4a7ba7] rounded-r-xl p-5 shadow-sm">
                 <h4 className="font-bold text-[#1c2834] text-[14px] mb-3">Keyboard Navigation</h4>
                 <div className="space-y-2.5 text-[12px] text-gray-600">
                   <div className="flex items-center gap-2"><kbd className="px-1.5 py-0.5 bg-white border border-gray-200 rounded shadow-sm font-sans text-xs text-[#1c2834]">Tab</kbd> - Navigate forward</div>
                   <div className="flex items-center gap-2"><kbd className="px-1.5 py-0.5 bg-white border border-gray-200 rounded shadow-sm font-sans text-xs text-[#1c2834]">Shift + Tab</kbd> - Navigate backward</div>
                   <div className="flex items-center gap-2"><kbd className="px-1.5 py-0.5 bg-white border border-gray-200 rounded shadow-sm font-sans text-xs text-[#1c2834]">Enter</kbd> - Activate element</div>
                   <div className="flex items-center gap-2"><kbd className="px-1.5 py-0.5 bg-white border border-gray-200 rounded shadow-sm font-sans text-xs text-[#1c2834]">Esc</kbd> - Close modals</div>
                 </div>
              </div>

              {/* Screen Reader Compatible Info */}
              <div className="mb-8 bg-[#f2fcf5] border-l-[3px] border-[#22c55e] rounded-r-xl p-5 shadow-sm">
                 <h4 className="font-bold text-[#1c2834] text-[14px] mb-1.5">Screen Reader Compatible</h4>
                 <p className="text-[12px] text-gray-600 leading-relaxed pr-2">This website is optimized for JAWS, NVDA, and VoiceOver screen readers.</p>
              </div>

              {/* Reset */}
              <button
                onClick={resetAccess}
                className="w-full py-4 bg-[#e2e8f0] hover:bg-[#cbd5e1] text-[#1c2834] rounded-xl text-[14px] font-bold transition-colors mb-4"
              >
                Reset All Settings
              </button>
            </div>
          </div>
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
